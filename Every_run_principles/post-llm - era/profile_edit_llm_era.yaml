# profile.yaml
# Version: 2.1-llm-era — Root Problem First + Empirical Sprint + LLM-era Transformation Filter
# 目的:给 Trajectory Designer 提供诚实的自我画像。
# 注意:这不是简历。不要包装。不要写空泛优点。
# 应该写"模型需要知道的关于我的事实"。

profile_version: "2.1-root-problem-empirical-sprint-llm-era-filter"
last_updated: "2026-06-25"

north_star:
  sentence: "我需要找到研究根问题，形成研究方向感,而不是迷失在论文的海洋里。"
  current_decision_problem: >
    在 3-4 周内形成一组高质量候选根问题，并通过每周读论文 + 复现实验 + failure analysis 的
    empirical sprint, 判断哪个根问题值得作为博士阶段 3-5 年主线。
  what_i_am_not_looking_for:
    - "不是找一个短期 paper idea"
    - "不是找一个热门 method label"
    - "不是找一个可以快速刷榜的 benchmark trick"
    - "不是找一个需要我先搭完整系统 / benchmark / 数据集才能开始的荒地"
  what_i_am_looking_for:
    - "一个真实、长期、可验证、可深挖的根问题"
    - "一个能自然长出 3-5 个递进子问题的问题树"
    - "一个能支撑 4 篇 paper narrative arc 的博士主线"
    - "一个对人类 / 公共利益有明确正外部性、但暂时商业化吸引力不足的蓝海方向"
  llm_era_transformation_requirement:
    definition: >
      候选根问题必须说明 LLM / AI systems 的到来如何改变了真实场景中的知识接口、
      数据生产方式、评估机制、社会依赖结构、模型能力分布或 failure mode。
    not_enough: >
      不能只是“用 LLM / Transformer / 更强模型解决一个旧问题”。
      如果该问题在 2018 年也几乎以同样形式成立，只是现在换了 backbone，
      则应降级为 legacy ML public-good problem，不应进入主线 Go 候选。
    target_zone: >
      我真正寻找的是 LLM 主赛道内的公共利益盲区：
      贴近 LLM / AI 主干技术变化，但商业系统不会自然优先解决其公共利益版本。

