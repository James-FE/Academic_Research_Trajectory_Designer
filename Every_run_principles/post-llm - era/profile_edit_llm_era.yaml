risk_profile:
  intellectual_risk: "中等偏高——可以接受方向冷门、社区小、被理解成本高,但需要存在 minimal viable 学术认可路径(至少能投出 B 会,长期能撑起 2A)"
  publication_risk: "中等。长期看 2A + 其余 B 在 3.5 年内宽松;短期看 3 个月内需要至少一个 paper-shaped 产出作为开题前内/外双重 evidence"
  engineering_risk: "低——单兵战法明确排除需要复杂系统工程的方向"
  domain_learning_risk: "中等——愿意花 6 个月学一个 domain,但要求该 domain 在 3 个月内已能产出 entry-level 工作,不能是纯前期 immersion"

proposal_evaluation_dual_standard:
  internal_standard: "我自己必须真的相信这个方向能持续产出 4 篇 paper(≥2A),并且能心安理得地走 3.5 年。这是前置门——通不过这一关,开题无意义。"
  external_standard: "开题委员会必须能被说服:方向合理、方法论 sound、workload 现实、narrative 清晰、第一篇与第四篇之间的递进在 reviewer 眼里成立。"
  ordering: "internal 在前,external 在后。但两关同等重要,只有都过才能开题。"

trajectory_designer_success_criteria:
  - "Trajectory 必须通过自我标准的内审红队(Round 5 Stage 1):3 年后的我会感谢现在的选择吗?哪一篇我心里其实没把握?哪个失败模式我在回避?"
  - "Trajectory 必须通过模拟委员会的外审红队(Round 5 Stage 2):方法论 sound 吗?workload 合理吗?contribution 清晰吗?narrative 跳跃站得住吗?"
  - "必须能解释为什么该方向不是红海、不是死海、不是方法驱动的伪主线。"
  - "必须形成 trajectory_final.md,并包含第一篇 entry paper 的 3 个月计划。"

meta_context:
  cognitive_descent_path:
  cognitive_path: >
    我曾从 idea2paper / research agent 方向转向 Academic Radar，再意识到 corpus mining 不能替代战略选题。
    当前阶段是 Trajectory Designer：回到根问题选择，并用 empirical sprint 验证候选方向。
  deprecated_interests: >
    research agent / medical agent 等旧兴趣不再代表当前博士主线偏好。
  recent_value_axis_formation: "'对人类有益但暂时商业化吸引力不足 = 蓝海 = 处众人之恶' 这个 value_axis 是最近 4 个月才形成的。在此之前的兴趣表述(尤其是 research agent / medical agent 方向)已不再代表当前方向偏好。"
  research_orientation: "problem-driven 而非 method-driven。Agent / multi-agent / 自动化 pipeline / LLM 应用框架等都视为方法工具,不作为研究主线 contribution。博士主线应当锚定在一个真实问题(科学问题 / 社会问题 / 公共问题),而 ML/AI 方法是服务于这个问题的工具。但候选根问题必须额外通过 LLM-era transformation filter: 说明 LLM 到来后该问题为何新出现、被结构性放大或变得系统可研究。"
  thesis_arc_requirement: "4 篇 paper(≥2A)必须构成 coherent narrative arc(foundational → extension → bridging → impact),不能是 4 篇独立 paper 的拼凑。开题报告需要 defend 这个 narrative。"
  trajectory_designer_deadline: "Trajectory Designer 的真实 deadline 是 3 个月后的开题报告。5 轮漏斗必须在 3-4 周内跑完,留出后续时间给:(1) 第一篇 entry paper 的快速产出,(2) 文献深读,(3) 开题报告撰写。"
  first_paper_dual_role: "第一篇 paper 必须在博士主线方向上(同时服务内审 evidence + 外审 productivity proof + 主线 entry)。它不是'与主线弱关联的 side project',而是主线方向的 entry-level work。"

profile_interpretation_rules:
  do:
    - "优先输出根问题句，而不是方向标签"
    - "每个候选必须先做 LLM-era transformation check: 判断它是否因 LLM 到来而新出现、结构性放大或变得可研究"
    - "每个候选都检验 sustainability / depth / accumulativeness / mainline clarity"
    - "明确 evidence substrate: dataset / benchmark / metric / baseline / repo / shared task"
    - "明确第一篇 entry paper 在 3 个月内如何启动"
    - "主动指出哪些方向虽然表面适合但实际应该 Kill"
    - "保留候选多样性，不要全部 anchor 到信号处理"
    - "在 empirical sprint 阶段，把 LLM 定位为辅助，而不是替代我的实验判断"
  do_not:
    - "不要推荐纯热门方向或默认 LLM agent / RAG / productivity 方向"
    - "不要把 pre-LLM 时代已经成立的旧问题仅因换成 LLM backbone 就包装成新时代根问题"
    - "不要用漂亮 narrative 替代可复现 evidence"
    - "不要建议我先花半年造数据集、benchmark 或完整 pipeline"
    - "不要把导师建议自动等同于最佳方向"
    - "不要把我的现有背景当成上限"
    - "不要把 method 当成 root problem"


