self_positioning:
  current: "单兵博士生(solo PhD researcher)"
  lab_context: "实质独立研究者——advisor 自由度极高 + lab 无主流方向 + 无可继承资源"
  future_aspiration: "可能成为 system builder,但博士阶段不押注于此"
  implication: "所有候选方向必须单兵可执行,不依赖团队、多 agent 协同、完整 pipeline 工程化、或 lab 生态支撑"
  core_strategy: >
    选择一个真实根问题，通过公开 evaluation substrate、可复现实验、问题树递进和长期 narrative 建立优势。
  forbidden_strategy: >
    不通过搭复杂系统、堆多 agent pipeline、造 benchmark、长期谈数据或跟大公司正面拼规模来建立优势。

positioning_on_advantage:
  framing: >
    我的本硕 ECE 背景是 floor 不是 ceiling。
    Round 1 应探索全局最优根问题，不应把所有候选都 anchor 到信号处理周围。
  desired_candidate_mix:
    a_signal_processing_leverage: "直接利用信号处理 /计算机视觉/ 图像 / 时序 / 频域 / 传感背景的方向"
    b_weakly_related_but_important: "与信号处理弱关联，但问题重要、资源可达、单兵可做的方向"
    c_new_skill_4_to_8_weeks: "需要 4-8 周新学技能，但符合所有其他约束的方向"
  hard_instruction_to_model:
    - "7-10 个候选根问题不能 5 个以上都 collapse 到信号处理变体"
    - "不要因为我有信号处理背景，就忽略更高质量的非信号处理根问题"
    - "也不要为了跨界而推荐需要长期 domain immersion 的方向"
  benchmark_policy: >
    如果某新兴方向已有 public benchmark / dataset / baseline,这通常是可执行蓝海的正信号，不应自动降级为已成熟方向。

capabilities:
  strongest:
    - "能独立从 paper 复现到可跑 baseline"
    - "能在项目接近完成时识别 category error: 区分'工具做完了'和'核心问题被回答了'"
    - "中等工程能力 + AI 编程辅助下，可完成学术级原型 pipeline"
    - "曾在 3 周内完成 1599 篇论文的 corpus extraction 系统，证明可快速搭建研究工具"
    - "不被沉没成本绑架，能主动暂停或归档接近完成的项目并重新选择方向"
  weaknesses:
    - "容易把认知问题工程化，花时间设计系统而不是直接面对判断"
    - "能复现 paper, 但不擅长分析 failure case: empirical sprint 应特别训练这一点"
    - "数学推导能力非对称——工程数学(线性代数、概率、信号处理数学、傅里叶分析)OK(本硕训练支撑),但 ML 理论数学(measure theory、convex optimization theory、概率不等式)弱。意味着纯 ML 理论方向(learning theory / optimization theory / 理论 RL)不适合;但信号处理 + 应用 ML 方向的数学门槛在我能力范围内。"
    - "工程上限受限——AI 辅助下能做学术级原型,但无法独立搭建产品级或多组件复杂系统"
    - "英文学术写作需要 AI 辅助才能达到投稿质量——意味着 rebuttal 和口头交流可能仍有摩擦"
  concrete_unfair_advantages:
    - "advisor 给予极高研究自由度(可以做任何能发论文的方向),对比典型博士生被 advisor 方向锁死,这是关键 advantage"
    - "时间自由度极高——每周稳定 50 小时科研投入,对比典型博士生 20-30 小时,接近 2x 时间优势"
    - "硬件资源不算单兵博士生标配:RTX 4080 + DGX Spark 128G + V100 一张,必要时可租 A100/H100。中等规模实验可本地完成"
    - "无 lab 主流方向锁死——可以选择与 lab 完全无关的冷门方向而不被强制拉回"
    - "本硕信号处理 + 电子工程背景——对涉及时序信号、频域分析、物理信号、图像的方向,domain learning 成本接近零。大多数 CS-only 出身的 AI 博士生不具备这种领域基础。注意:这是 floor 不是 ceiling(参见 positioning_on_advantage)。"
    - "本硕走过一次 publication 流程，我主要是负责写代码做实验+优化方法,主要idea和投稿都是老师建议的,投稿经验不完整"


